name: Release SDK

on:
  push:
    tags:
      - "sdk-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # npm Trusted Publishing requires npm >=11.5.1; Node 24 includes it.
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install SDK dependencies
        run: npm ci --ignore-scripts

      - name: Verify version matches tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${REF_NAME#sdk-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Prepare publish artifacts
        run: npm run clean && npm run build

      - name: Verify pack contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          if grep -E '(src/|\.test\.|\.spec\.|tsconfig)' pack-output.txt; then
            echo "ERROR: unexpected files found in pack output"
            exit 1
          fi

      - name: Publish
        # Configure this exact workflow as the package's npm Trusted Publisher.
        # No reusable registry token is accepted by the release job.
        run: npm publish --ignore-scripts --provenance --access public
