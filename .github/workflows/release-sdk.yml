name: Release SDK

on:
  push:
    tags:
      - "sdk-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval before publish
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # npm Trusted Publishing requires npm >= 11.5.1. Node 24's bundled
          # npm is compatible; matches the main release.yml runner setup.
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install SDK dependencies
        # Use `npm ci` for a reproducible install from package-lock.json.
        # `npm install` resolves versions afresh and can drift from the
        # lockfile that CI / typecheck ran against.
        run: npm ci

      - name: Verify version matches tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${REF_NAME#sdk-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Verify pack contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          if grep -E '(src/|\.test\.|\.spec\.|tsconfig)' pack-output.txt; then
            echo "ERROR: unexpected files found in pack output"
            exit 1
          fi

      - name: Publish
        # Prefer npm Trusted Publishing (OIDC). Mirrors the main release.yml
        # flow: NODE_AUTH_TOKEN is only used as an emergency fallback for
        # environments where Trusted Publishing isn't yet configured.
        # Trust configured on npmjs.com → @socialneuron/sdk → Access →
        # Trusted Publisher: org=socialneuron, repo=mcp-server,
        # workflow=release-sdk.yml, env=production.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > ~/.npmrc
          fi
          npm publish --access public --provenance
