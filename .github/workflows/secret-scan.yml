name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@v3.95.8
        with:
          # The action already supplies --fail. Scan verified and unknown
          # (unverifiable, e.g. Supabase service-role keys) results; exclude the
          # low-signal filtered bucket to keep false positives down.
          extra_args: --results=verified,unknown
