name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Lint package-lock.json
        run: npm run lint:lockfile

      - name: Dependency cooldown (warn-only)
        run: npm run check:dep-age
        # NOTE: warn-only for now so existing fresh security pins (from the
        # 2026-04-08 Dependabot closure) don't block CI. Flip to enforce
        # by setting SN_DEP_AGE_ENFORCE=true here once current young deps
        # have aged past 14 days (approximately 2026-04-22).

      - name: Test
        run: npm test

      - name: Audit (critical)
        run: npm audit --audit-level=critical

      - name: Build
        run: npm run build:all

      - name: Verify pack contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          if grep -E '(src/|\.test\.|\.spec\.|vitest|tsconfig|\.env|\.github|gitleaks)' pack-output.txt; then
            echo "ERROR: unexpected files found in pack output"
            exit 1
          fi
          echo "Pack contents verified - no src/ or test files"
