name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Lint package-lock.json
        run: npm run lint:lockfile

      - name: Detect dependency-surface changes
        id: dep-surface
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}")"
          else
            changed="$(git diff --name-only HEAD^ HEAD || true)"
          fi

          if printf '%s\n' "$changed" | grep -E '^(package(-lock)?\.json|packages/sdk/package(-lock)?\.json|apps/content-calendar/package(-lock)?\.json|\.github/workflows/release(-sdk)?\.yml)$'; then
            echo "enforce=true" >> "$GITHUB_OUTPUT"
          else
            echo "enforce=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dependency cooldown (enforced for dependency surfaces)
        if: steps.dep-surface.outputs.enforce == 'true'
        run: npm run check:dep-age
        env:
          SN_DEP_AGE_ENFORCE: "true"

      - name: Dependency cooldown (warn-only)
        if: steps.dep-surface.outputs.enforce != 'true'
        run: npm run check:dep-age

      - name: Lint tool descriptions
        run: npm run lint:tools

      - name: Verify tools.lock.json drift
        run: npm run verify:lock

      - name: Verify public metadata contract
        run: npm run verify:metadata

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit (critical)
        run: npm audit --audit-level=critical

      - name: Build
        run: npm run build:all

      # packages/sdk is a separate npm-published workspace with its own
      # lockfile; root typecheck/test/build never touch it, so exercise it
      # explicitly (2026-07-12: a TS major bump merged with zero CI coverage).
      - name: SDK typecheck + build
        working-directory: packages/sdk
        run: |
          npm ci --ignore-scripts
          npx tsc --noEmit
          npm run build

      - name: Verify pack contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          if grep -E '(src/|\.test\.|\.spec\.|vitest|tsconfig|\.env|\.github|gitleaks)' pack-output.txt; then
            echo "ERROR: unexpected files found in pack output"
            exit 1
          fi
          echo "Pack contents verified - no src/ or test files"
