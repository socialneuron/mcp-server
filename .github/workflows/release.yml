name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # Required for npm provenance attestation (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval before publish

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # npm Trusted Publishing requires npm >= 11.5.1. GitHub's Node 24
          # toolchain includes a compatible npm without a brittle global upgrade.
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci --ignore-scripts

      - name: Verify version matches tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Lint package-lock.json
        run: npm run lint:lockfile

      - name: Dependency cooldown (enforced on release)
        run: npm run check:dep-age
        env:
          SN_DEP_AGE_ENFORCE: "true"
          # Reviewed per-tag cooldown bypasses (young-dependency blocking off for
          # that tag only). v1.7.9: OAuth hardening. v1.7.10: stdio tools/list fix.
          # v1.7.18: ships the internal-surface scrub + error_type + rate-limit fix
          # + real /v1 REST API; the only young dep shipped to consumers is a
          # posthog-node patch (5.38→5.39, trusted, lockfile-pinned). Dev deps
          # (remotion/playwright/@types/node) don't ship in the dist bundle. All
          # other release gates (verify:metadata, verify:lock, lint:tools, audit,
          # typecheck, tests) still run.
          SN_DEP_MIN_AGE_DAYS: ${{ (github.ref_name == 'v1.7.9' || github.ref_name == 'v1.7.10' || github.ref_name == 'v1.7.18') && '0' || '14' }}
        # Release is stricter than CI: young deps block publish.

      - name: Lint tool descriptions
        run: npm run lint:tools

      - name: Verify tools.lock.json drift
        run: npm run verify:lock

      - name: Verify public metadata contract
        run: npm run verify:metadata

      - name: Audit (critical)
        run: npm audit --audit-level=critical

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build:all

      - name: Verify pack contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          if grep -E '(src/|\.test\.|\.spec\.|vitest|tsconfig|\.env|\.github|gitleaks)' pack-output.txt; then
            echo "ERROR: unexpected files found in pack output"
            exit 1
          fi

      - name: Prepare publish artifacts
        run: npm run prepublishOnly

      - name: Publish
        # Prefer npm Trusted Publishing (OIDC). npm CLI uses OIDC in eligible
        # GitHub environments before falling back to traditional token auth.
        # NPM_TOKEN remains configured only as an emergency fallback for this
        # security release path.
        # Trust is configured on npmjs.com → package → Access → Trusted Publisher:
        #   org=socialneuron, repo=mcp-server, workflow=release.yml, env=production
        # Requires: permissions.id-token: write (set above) + production environment gate.
        # --provenance generates SLSA Build L2 attestation, signed via GitHub OIDC.
        # https://docs.npmjs.com/trusted-publishers
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > ~/.npmrc
          fi
          npm publish --ignore-scripts --access public --provenance
