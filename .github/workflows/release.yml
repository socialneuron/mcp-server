name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # Required for npm provenance attestation (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Verify version matches tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Audit (critical)
        run: npm audit --audit-level=critical

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build:all

      - name: Verify pack contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          if grep -E '(src/|\.test\.|\.spec\.|vitest|tsconfig|\.env|\.github|gitleaks)' pack-output.txt; then
            echo "ERROR: unexpected files found in pack output"
            exit 1
          fi

      - name: Publish
        # --provenance generates SLSA Build L2 attestation via GitHub OIDC.
        # Requires id-token: write permission (set above).
        # History: --provenance was removed in v1.3.1 due to a 404 on scoped
        # packages when the npm token lacked the correct permissions. The
        # NPM_TOKEN was rotated to a Granular Access Token with Bypass 2FA
        # (2026-03-20) which supports provenance. If publish fails with a
        # 404 again, verify the token has "Publish" + "Bypass 2FA" permissions
        # and that the @socialneuron scope is included in the token's allowed scopes.
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
