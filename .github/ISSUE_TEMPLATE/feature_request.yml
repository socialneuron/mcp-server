name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]

body:
  - type: checkboxes
    id: boundary
    attributes:
      label: Repository boundary
      description: This public tracker covers only the public npm package, SDK, CLI, hosted-MCP public behavior, and reproducible interoperability issues.
      options:
        - label: This concerns the public package/SDK/CLI/hosted-MCP surface and contains no private operational, customer, or internal-infrastructure detail.
          required: true

  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like?
      placeholder: A clear description of the feature
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would you use this feature? What problem does it solve?
      placeholder: "I want to be able to ... so that ..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternatives?
