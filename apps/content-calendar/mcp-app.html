<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Social Neuron — Content Calendar</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 16px;
        background: #fafafa;
        color: #1a1a1a;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 4px;
      }
      .subtitle {
        color: #666;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .upgrade-banner {
        background: #fef3c7;
        border: 1px solid #fbbf24;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 12px;
        font-size: 13px;
      }
      .upgrade-banner a {
        color: #92400e;
        font-weight: 600;
      }
      .week-grid {
        display: grid;
        grid-template-columns: 60px repeat(7, 1fr);
        gap: 4px;
      }
      .header {
        font-size: 11px;
        text-transform: uppercase;
        color: #666;
        padding: 6px;
        font-weight: 600;
      }
      .hour-label {
        font-size: 11px;
        color: #999;
        padding: 4px 6px;
        text-align: right;
      }
      .slot {
        background: #fff;
        border: 1px solid #e5e5e5;
        min-height: 36px;
        border-radius: 4px;
        padding: 4px;
      }
      .post-card {
        background: #f0f9ff;
        border-left: 3px solid #3b82f6;
        padding: 4px 6px;
        margin: 2px 0;
        border-radius: 3px;
        font-size: 11px;
        cursor: grab;
        line-height: 1.3;
      }
      .post-card.disabled {
        cursor: default;
      }
      .post-platform {
        font-size: 9px;
        text-transform: uppercase;
        font-weight: 700;
        color: #3b82f6;
        margin-bottom: 1px;
      }
      .empty-state {
        text-align: center;
        color: #999;
        padding: 48px 16px;
      }
      .post-card.dragging {
        opacity: 0.4;
      }
      .slot.drop-target {
        background: #eff6ff;
        border-color: #3b82f6;
        border-style: dashed;
      }
      #toast {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: #1f2937;
        color: #fff;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
        max-width: 320px;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.18s, transform 0.18s;
        pointer-events: none;
        z-index: 1000;
      }
      #toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      #toast.error {
        background: #991b1b;
      }
    </style>
  </head>
  <body>
    <h1>Content Calendar</h1>
    <p class="subtitle" id="subtitle">Loading scheduled posts…</p>
    <div id="upgrade-banner-slot"></div>
    <div id="root"></div>
    <div id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
