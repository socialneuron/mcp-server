<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Social Neuron — Content Calendar</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 16px;
        background: #fafafa;
        color: #1a1a1a;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 4px;
      }
      .subtitle {
        color: #666;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .upgrade-banner {
        background: #fef3c7;
        border: 1px solid #fbbf24;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 12px;
        font-size: 13px;
      }
      .upgrade-banner a {
        color: #92400e;
        font-weight: 600;
      }
      .week-grid {
        display: grid;
        grid-template-columns: 60px repeat(7, 1fr);
        gap: 4px;
      }
      .header {
        font-size: 11px;
        text-transform: uppercase;
        color: #666;
        padding: 6px;
        font-weight: 600;
      }
      .hour-label {
        font-size: 11px;
        color: #999;
        padding: 4px 6px;
        text-align: right;
      }
      .slot {
        background: #fff;
        border: 1px solid #e5e5e5;
        min-height: 36px;
        border-radius: 4px;
        padding: 4px;
      }
      .post-card {
        background: #f0f9ff;
        border-left: 3px solid #3b82f6;
        padding: 4px 6px;
        margin: 2px 0;
        border-radius: 3px;
        font-size: 11px;
        cursor: grab;
        line-height: 1.3;
      }
      .post-card.disabled {
        cursor: default;
      }
      .post-platform {
        font-size: 9px;
        text-transform: uppercase;
        font-weight: 700;
        color: #3b82f6;
        margin-bottom: 1px;
      }
      .empty-state {
        text-align: center;
        color: #999;
        padding: 48px 16px;
      }
      .post-card.dragging {
        opacity: 0.4;
      }
      .slot.drop-target {
        background: #eff6ff;
        border-color: #3b82f6;
        border-style: dashed;
      }
      #toast {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: #1f2937;
        color: #fff;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
        max-width: 320px;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.18s, transform 0.18s;
        pointer-events: none;
        z-index: 1000;
      }
      #toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      #toast.error {
        background: #991b1b;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .filter-pills {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .pill {
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 999px;
        padding: 4px 12px;
        font-size: 11px;
        cursor: pointer;
        text-transform: uppercase;
        font-weight: 600;
        color: #666;
        user-select: none;
      }
      .pill:hover {
        background: #f0f9ff;
        border-color: #3b82f6;
      }
      .pill.active {
        background: #3b82f6;
        color: #fff;
        border-color: #3b82f6;
      }
      .suggest-btn {
        background: #fff;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .suggest-btn:hover:not(:disabled) {
        background: #eff6ff;
      }
      .suggest-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .slot.suggested {
        background: #f0fdf4;
        border-color: #22c55e;
        border-style: dashed;
        animation: pulse 1.4s ease-in-out 3;
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.45); }
        50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
      }
      .post-card {
        cursor: pointer;
      }
      .post-card.disabled {
        cursor: pointer;
      }
      #drilldown {
        position: fixed;
        top: 0;
        right: 0;
        width: 360px;
        max-width: 100vw;
        height: 100vh;
        background: #fff;
        border-left: 1px solid #e5e5e5;
        box-shadow: -4px 0 16px rgba(0, 0, 0, 0.06);
        padding: 20px 24px;
        transform: translateX(100%);
        transition: transform 0.2s;
        overflow-y: auto;
        z-index: 900;
      }
      #drilldown.open {
        transform: translateX(0);
      }
      .drilldown-close {
        position: absolute;
        top: 12px;
        right: 16px;
        background: none;
        border: none;
        font-size: 22px;
        cursor: pointer;
        color: #666;
        line-height: 1;
      }
      .drilldown-close:hover {
        color: #1a1a1a;
      }
      .drilldown-row {
        margin: 12px 0;
        font-size: 13px;
      }
      .drilldown-row .label {
        color: #666;
        font-size: 11px;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .drilldown-row .value {
        word-break: break-word;
      }
      .status-pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .status-pill.scheduled { background: #fef3c7; color: #92400e; }
      .status-pill.published { background: #d1fae5; color: #065f46; }
      .status-pill.draft     { background: #e5e5e5; color: #525252; }
      .status-pill.failed    { background: #fee2e2; color: #991b1b; }
      .add-btn {
        background: transparent;
        border: 1px dashed #d4d4d4;
        border-radius: 4px;
        color: #999;
        padding: 4px;
        font-size: 11px;
        width: 100%;
        cursor: pointer;
        margin-top: 2px;
      }
      .add-btn:hover {
        border-color: #3b82f6;
        color: #3b82f6;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1100;
      }
      .modal-backdrop.open {
        display: flex;
      }
      .modal {
        background: #fff;
        border-radius: 8px;
        padding: 20px 24px;
        width: 440px;
        max-width: 95vw;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }
      .modal h2 {
        font-size: 16px;
        margin: 0 0 16px;
      }
      .modal label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        font-weight: 600;
        color: #666;
        margin-bottom: 4px;
      }
      .modal-row {
        margin-bottom: 14px;
      }
      .modal input,
      .modal select,
      .modal textarea {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid #d4d4d4;
        border-radius: 4px;
        font-size: 13px;
        font-family: inherit;
        box-sizing: border-box;
      }
      .modal textarea {
        resize: vertical;
        min-height: 80px;
      }
      .modal .char-count {
        font-size: 11px;
        color: #999;
        margin-top: 2px;
      }
      .modal .char-count.over {
        color: #991b1b;
        font-weight: 600;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 16px;
      }
      .modal-actions button {
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid #d4d4d4;
        background: #fff;
      }
      .modal-actions .primary {
        background: #3b82f6;
        color: #fff;
        border-color: #3b82f6;
      }
      .modal-actions .primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .modal .error-msg {
        color: #991b1b;
        font-size: 12px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Content Calendar</h1>
    <p class="subtitle" id="subtitle">Loading scheduled posts…</p>
    <div id="upgrade-banner-slot"></div>
    <div class="toolbar" id="toolbar"></div>
    <div id="root"></div>
    <aside id="drilldown" aria-hidden="true"></aside>
    <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
      <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
    </div>
    <div id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
