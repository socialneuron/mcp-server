<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>Social Neuron — Content Calendar</title>
    <style>
      :root {
        color-scheme: light dark;
        /* Local tokens mapped onto Claude's host style variables (set at runtime
           by applyHostStyleVariables). Literal fallbacks keep the app readable
           outside a host. Brand teal stays literal — accents are allowed. */
        --sn-surface: var(--color-background-primary, #ffffff);
        --sn-surface-2: var(--color-background-secondary, #f5f4ed);
        --sn-text: var(--color-text-primary, #1a1a1a);
        --sn-muted: var(--color-text-secondary, #666);
        --sn-faint: var(--color-text-tertiary, #999);
        --sn-line: var(--color-border-tertiary, #e5e5e5);
        /* Social Neuron brand green — accent only, over host surfaces. */
        --sn-accent: #00dc82;
        --sn-accent-strong: #00b86b;
        --sn-on-accent: #04311f;
      }
      html,
      body {
        background: transparent;
      }
      body {
        font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
        margin: 0;
        padding: 16px;
        color: var(--sn-text);
      }
      h1 {
        font-size: 18px;
        margin: 0;
      }
      .app-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .app-logo {
        width: 22px;
        height: 22px;
        border-radius: 5px;
        display: block;
        flex: none;
      }
      .subtitle {
        color: var(--sn-muted);
        font-size: 13px;
        margin-bottom: 16px;
      }
      .upgrade-banner {
        background: #fef3c7;
        border: 1px solid #fbbf24;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 12px;
        font-size: 13px;
      }
      .upgrade-banner a {
        color: #92400e;
        font-weight: 600;
      }
      .week-grid {
        display: grid;
        grid-template-columns: 60px repeat(7, minmax(80px, 1fr));
        gap: 4px;
        overflow-x: auto;
      }
      @media (max-width: 640px) {
        .week-grid {
          grid-template-columns: 56px repeat(7, minmax(64px, 1fr));
          font-size: 10px;
        }
        .header { padding: 4px; }
        .slot { min-height: 44px; padding: 2px; }
        .post-card { font-size: 10px; padding: 3px 4px; }
      }
      .header {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--sn-muted);
        padding: 6px;
        font-weight: 600;
      }
      .hour-label {
        font-size: 11px;
        color: var(--sn-faint);
        padding: 4px 6px;
        text-align: right;
      }
      .slot {
        background: var(--sn-surface);
        border: 1px solid var(--sn-line);
        min-height: 36px;
        border-radius: 4px;
        padding: 4px;
      }
      .post-card {
        background: var(--sn-surface-2);
        color: var(--sn-text);
        border-left: 3px solid var(--sn-accent);
        padding: 4px 6px;
        margin: 2px 0;
        border-radius: 3px;
        font-size: 11px;
        cursor: grab;
        line-height: 1.3;
      }
      .post-preview {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border-radius: 3px;
        margin-bottom: 4px;
        background: var(--sn-line);
        display: block;
      }
      .post-card.disabled {
        cursor: default;
      }
      .post-platform {
        font-size: 9px;
        text-transform: uppercase;
        font-weight: 700;
        color: var(--sn-accent);
        margin-bottom: 1px;
      }
      .empty-state {
        text-align: center;
        color: var(--sn-faint);
        padding: 48px 16px;
      }
      .post-card.dragging {
        opacity: 0.4;
      }
      .slot.drop-target {
        background: #eff6ff;
        border-color: var(--sn-accent);
        border-style: dashed;
      }
      #toast {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: var(--color-background-inverse, #1f2937);
        color: var(--color-text-inverse, #fff);
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
        max-width: 320px;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.18s, transform 0.18s;
        pointer-events: none;
        z-index: 1000;
      }
      #toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      #toast.error {
        background: #991b1b;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .filter-pills {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .pill {
        background: var(--sn-surface);
        border: 1px solid var(--sn-line);
        border-radius: 999px;
        padding: 4px 12px;
        font-size: 11px;
        cursor: pointer;
        text-transform: uppercase;
        font-weight: 600;
        color: var(--sn-muted);
        user-select: none;
      }
      .pill:hover {
        background: #f0f9ff;
        border-color: var(--sn-accent);
      }
      .pill.active {
        background: var(--sn-accent);
        color: var(--sn-on-accent);
        border-color: var(--sn-accent);
      }
      .suggest-btn {
        background: var(--sn-surface);
        border: 1px solid var(--sn-accent);
        color: var(--sn-accent);
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .suggest-btn:hover:not(:disabled) {
        background: #eff6ff;
      }
      .suggest-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .slot.suggested {
        background: #f0fdf4;
        border-color: #22c55e;
        border-style: dashed;
        animation: pulse 1.4s ease-in-out 3;
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.45); }
        50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
      }
      .post-card {
        cursor: pointer;
      }
      #drilldown {
        position: fixed;
        top: 0;
        right: 0;
        width: 360px;
        max-width: 100vw;
        height: 100vh;
        background: var(--sn-surface);
        border-left: 1px solid var(--sn-line);
        box-shadow: -4px 0 16px rgba(0, 0, 0, 0.06);
        padding: 20px 24px;
        box-sizing: border-box;
        transform: translateX(100%);
        transition: transform 0.2s;
        overflow-y: auto;
        z-index: 900;
      }
      @media (max-width: 640px) {
        #drilldown {
          width: 100vw;
        }
      }
      .drilldown-heading {
        font-size: 15px;
        margin: 4px 32px 16px 0;
        font-weight: 600;
      }
      #drilldown.open {
        transform: translateX(0);
      }
      .drilldown-close {
        position: absolute;
        top: 12px;
        right: 16px;
        background: none;
        border: none;
        font-size: 22px;
        cursor: pointer;
        color: var(--sn-muted);
        line-height: 1;
      }
      .drilldown-close:hover {
        color: #1a1a1a;
      }
      .drilldown-row {
        margin: 12px 0;
        font-size: 13px;
      }
      .drilldown-row .label {
        color: var(--sn-muted);
        font-size: 11px;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .drilldown-row .value {
        word-break: break-word;
      }
      .media-preview {
        width: 100%;
        margin: 0 0 16px;
        background: #f5f5f5;
        border: 1px solid var(--sn-line);
        border-radius: 6px;
        overflow: hidden;
      }
      .media-preview img,
      .media-preview video {
        width: 100%;
        max-height: 280px;
        object-fit: contain;
        display: block;
      }
      .status-pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .status-pill.scheduled { background: #fef3c7; color: #92400e; }
      .status-pill.published { background: #d1fae5; color: #065f46; }
      .status-pill.draft     { background: var(--sn-line); color: #525252; }
      .status-pill.failed    { background: #fee2e2; color: #991b1b; }
      .add-btn {
        background: transparent;
        border: 1px dashed var(--sn-line);
        border-radius: 4px;
        color: var(--sn-faint);
        padding: 4px;
        font-size: 11px;
        width: 100%;
        cursor: pointer;
        margin-top: 2px;
      }
      .add-btn:hover {
        border-color: var(--sn-accent);
        color: var(--sn-accent);
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1100;
      }
      .modal-backdrop.open {
        display: flex;
      }
      .modal {
        background: var(--sn-surface);
        border-radius: 8px;
        padding: 20px 24px;
        width: 440px;
        max-width: 95vw;
        max-height: 90vh;
        overflow-y: auto;
        box-sizing: border-box;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }
      @media (max-width: 480px) {
        .modal {
          padding: 16px;
          border-radius: 6px;
        }
      }
      .modal h2 {
        font-size: 16px;
        margin: 0 0 16px;
      }
      .modal label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        font-weight: 600;
        color: var(--sn-muted);
        margin-bottom: 4px;
      }
      .modal-row {
        margin-bottom: 14px;
      }
      .modal input,
      .modal select,
      .modal textarea {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid var(--sn-line);
        border-radius: 4px;
        font-size: 13px;
        font-family: inherit;
        box-sizing: border-box;
      }
      .modal textarea {
        resize: vertical;
        min-height: 80px;
      }
      .modal .char-count {
        font-size: 11px;
        color: var(--sn-faint);
        margin-top: 2px;
      }
      .modal .char-count.over {
        color: #991b1b;
        font-weight: 600;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 16px;
      }
      .modal-actions button {
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid var(--sn-line);
        background: var(--sn-surface);
      }
      .modal-actions .primary {
        background: var(--sn-accent);
        color: var(--sn-on-accent);
        border-color: var(--sn-accent);
      }
      .modal-actions .primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .modal .error-msg {
        color: #991b1b;
        font-size: 12px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="app-header">
      <img
        class="app-logo"
        src="https://socialneuron.com/logo-icon.svg"
        alt="Social Neuron"
        width="22"
        height="22"
      />
      <h1>Content Calendar</h1>
    </div>
    <p class="subtitle" id="subtitle">Loading scheduled posts…</p>
    <div id="upgrade-banner-slot"></div>
    <div class="toolbar" id="toolbar"></div>
    <div id="root"></div>
    <aside id="drilldown" aria-hidden="true"></aside>
    <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
      <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
    </div>
    <div id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
